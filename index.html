<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yos1k Paint 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; background-color: #0c0401; }
        #background-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://iimg.su/s/13/gOBI4erxAiFR63DTueRlSU34MIdkfM2KBvKFiRAiU.png'); background-size: cover; background-position: center; filter: blur(10px) brightness(0.7); transform: scale(1.05); z-index: 1; }
        #signature { position: absolute; top: 20px; left: 20px; color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; transition: opacity 0.5s ease; z-index: 30; }
        .gradient-text { background: linear-gradient(to bottom, #ffcc00, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        #toolbar { position: fixed; top: 6%; left: 5%; z-index: 25; opacity: 0; transition: opacity 0.6s ease; background: #1a1a1a; padding: 8px 12px; border-radius: 20px; display: flex; gap: 12px; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        .divider { width: 1px; height: 30px; background-color: rgba(255, 255, 255, 0.1); margin: 0 4px; }

        .tool-btn { 
            width: 48px; 
            height: 48px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: #2b2b2b; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #888888;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tool-btn.active { 
            background: linear-gradient(135deg, #ffa825, #ff5100); 
            border: 1px solid #ffbc5e;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 81, 0, 0.35);
        }

        .tool-btn:hover:not(.active) {
            background: #383838;
            color: #b3b3b3;
        }

        /* Специальные стили для ползунка Hue (Цвет) */
        #hue-slider {
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-appearance: none;
            height: 10px;
            border-radius: 5px;
            outline: none;
            width: 80px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.3s;
        }
        #hue-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            border: 2px solid #000;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Скрытие инструментов при активных ножницах */
        body.scissors-active .hide-on-scissors { display: none !important; }
        .scissors-extra { display: none !important; }
        body.scissors-active .scissors-extra { display: flex !important; }

        #paint-app { position: fixed; top: 15%; left: 5%; width: 90%; height: 80%; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); overflow: hidden; opacity: 0; transform: scale(0.9); pointer-events: none; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 20; }
        
        #canvas-wrapper { 
            width: 100%; height: 100%; transform-origin: 0 0; position: relative;
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #d1d1d1 25%, transparent 25%), 
                              linear-gradient(-45deg, #d1d1d1 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #d1d1d1 75%), 
                              linear-gradient(-45deg, transparent 75%, #d1d1d1 75%);
            background-size: 15px 15px; 
            background-position: 0 0, 0 7.5px, 7.5px -7.5px, -7.5px 0px;
        }
        #paint-app.active, #toolbar.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        canvas { display: block; width: 100%; height: 100%; background: transparent; }
        
        #selection-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="background-layer"></div>
    <div id="signature">Made by yos1k</div>
    <div id="landing-page" class="absolute inset-0 flex flex-col justify-center items-center z-10">
        <div id="landing-content" class="bg-black/60 p-16 rounded-[40px] backdrop-blur-xl border border-white/10 flex flex-col items-center transition-opacity duration-500">
            <h1 class="gradient-text text-5xl mb-8 uppercase tracking-widest">YOS1K PAINT 2</h1>
            <button onclick="openCanvas()" class="bg-gradient-to-br from-orange-500 to-red-600 px-12 py-5 text-xl text-white rounded-2xl shadow-xl hover:scale-105 transition-transform uppercase font-bold tracking-wider">ОТКРЫТЬ ХОЛСТ</button>
        </div>
    </div>
    
    <div id="toolbar">
        <div id="brush-tool" class="tool-btn hide-on-scissors active" onclick="setMode('brush')" title="Кисть">
            <svg class="w-7 h-7" viewBox="0 0 24 24" fill="currentColor"><path d="M4 20l1.2-4.5 3.3 3.3z"/><path d="M6 14.5L15.5 5l3.5 3.5-9.5 9.5z"/><path d="M16.5 4l1-1c.7-.7 1.8-.7 2.5 0l1 1c.7.7.7 1.8 0 2.5l-1 1z"/></svg>
        </div>
        
        <!-- НОВАЯ КИСТЬ: Свечение / Огонь -->
        <div id="glow-tool" class="tool-btn hide-on-scissors" onclick="setMode('glow')" title="Светящаяся кисть (Glow)">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"></path>
            </svg>
        </div>

        <div id="text-tool" class="tool-btn hide-on-scissors" onclick="setMode('text')" title="Текст">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4v3h5.5v12h3V7H19V4H5z"/></svg>
        </div>
        <div id="hand-tool" class="tool-btn hide-on-scissors" onclick="setMode('hand')" title="Перемещение (Рука)">
            <svg class="w-6.5 h-6.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a1.25 1.25 0 0 0-1.25 1.25v6.5h-.75V4.25a1.25 1.25 0 0 0-2.5 0v6.5H6.75V5.75a1.25 1.25 0 0 0-2.5 0v7.5c0 4.14 3.36 7.5 7.5 7.5h1.5c4.14 0 7.5-3.36 7.5-7.5V9.25a1.25 1.25 0 0 0-2.5 0v3h-.75V3.25A1.25 1.25 0 0 0 16.25 2a1.25 1.25 0 0 0-1.25 1.25v7h-.75V2.25A1.25 1.25 0 0 0 13 1a1.25 1.25 0 0 0-1 1z"/></svg>
        </div>
        
        <div id="eraser-tool" class="tool-btn hide-on-scissors" onclick="setMode('eraser')" title="Ластик">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        </div>

        <div id="fill-tool" class="tool-btn hide-on-scissors" onclick="setMode('fill')" title="Заливка">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"></path><path d="m5 2 5 5"></path><path d="M2 13h15"></path><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"></path></svg>
        </div>
        
        <div id="smudge-tool" class="tool-btn hide-on-scissors" onclick="setMode('smudge')" title="Искажение (Ветер) - жесткий сдвиг">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
        </div>

        <div id="mixer-tool" class="tool-btn hide-on-scissors" onclick="setMode('mixer')" title="Смешиватель - смешивание цветов">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
        </div>
        
        <!-- Ножницы всегда видимы (кнопка переключатель) -->
        <div id="scissors-tool" class="tool-btn" onclick="setMode('scissors')" title="Ножницы (Вырезать и изменить цвет)">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle>
                <line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line>
            </svg>
        </div>
        
        <!-- Опции, появляющиеся ТОЛЬКО при активных ножницах -->
        <div class="scissors-extra flex items-center gap-2 border-l border-white/10 pl-2">
            <div id="rect-select-btn" class="tool-btn" onclick="toggleRectMode()" title="Ровность (Идеальный прямоугольник)">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                </svg>
            </div>
            
            <div class="flex items-center gap-1 bg-[#2b2b2b] px-2 py-1 rounded-xl border border-white/5" title="Поворот">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <input type="range" id="rotation-slider" min="-180" max="180" value="0" class="w-20 cursor-pointer accent-orange-500">
                <span id="rotationDisplay" class="text-[#888888] text-xs font-bold w-8 text-center">0°</span>
            </div>

            <div class="flex items-center gap-1 bg-[#2b2b2b] px-2 py-1 rounded-xl border border-white/5" title="Изменить цвет (Hue)">
                <input type="range" id="hue-slider" min="0" max="360" value="0" class="cursor-pointer">
            </div>
            
            <button onclick="commitSelection(); setMode('brush')" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-xl text-sm font-bold border border-green-400/30 transition shadow-lg shadow-green-900/30 ml-2">✓ Готово</button>
        </div>

        <div class="divider hide-on-scissors"></div>

        <div id="undo-btn" class="tool-btn hide-on-scissors" onclick="undo()" title="Отменить (Ctrl+Z)">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
        </div>
        <div id="redo-btn" class="tool-btn hide-on-scissors" onclick="redo()" title="Вернуть (Ctrl+Y, Ctrl+Shift+Z)">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
        </div>

        <div class="divider hide-on-scissors"></div>

        <input type="color" id="colorPicker" class="w-10 h-10 rounded-xl cursor-pointer border border-white/10 bg-transparent hide-on-scissors">
        
        <div class="flex items-center gap-1 bg-[#2b2b2b] px-2 py-1 rounded-xl border border-white/5 hide-on-scissors" title="Размер кисти/инструмента">
            <input type="range" id="brushSize" min="1" max="1000" value="5" class="w-24 cursor-pointer accent-orange-500">
            <span id="brushSizeDisplay" class="text-[#888888] text-xs font-bold w-8 text-center">5</span>
        </div>
        
        <div class="flex items-center gap-1 bg-[#2b2b2b] px-2 py-1 rounded-xl border border-white/5" title="Прозрачность (Opacity)">
            <input type="range" id="opacitySlider" min="1" max="100" value="100" class="w-24 cursor-pointer accent-blue-400">
            <span id="opacityDisplay" class="text-[#888888] text-xs font-bold w-10 text-center">100%</span>
        </div>
        
        <input type="range" id="textSize" min="10" max="100" value="30" class="w-24 cursor-pointer accent-orange-500 hide-on-scissors" title="Размер текста">

        <button onclick="toggleLibrary()" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 text-white rounded-xl font-bold transition border border-white/5 text-sm hide-on-scissors" title="Библиотека">Библиотека</button>
        
        <button onclick="triggerImageUpload()" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 text-white rounded-xl font-bold transition border border-white/5 text-sm hide-on-scissors">Вставить</button>
        <input type="file" id="imageLoader" accept="image/*" class="hidden" onchange="insertImage(event)">

        <button onclick="saveCanvas()" class="px-4 py-2 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-xl font-bold hover:scale-105 transition shadow-md shadow-red-900/20 text-sm hide-on-scissors">Сохранить</button>
        
        <button onclick="clearCanvas()" class="px-5 py-2 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition shadow-md shadow-red-900/30 text-sm hide-on-scissors">Сброс</button>
    </div>
    
    <div id="paint-app">
        <div id="canvas-wrapper">
            <canvas id="canvas"></canvas>
            <canvas id="selection-canvas"></canvas>
        </div>
    </div>

    <!-- Модальное окно Библиотеки -->
    <div id="library-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center backdrop-blur-sm">
        <div class="bg-[#1a1a1a] p-6 rounded-2xl border border-white/10 w-[80%] max-w-3xl h-[70%] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-white text-2xl font-bold">Библиотека изображений</h2>
                <button onclick="toggleLibrary()" class="text-white/50 hover:text-white transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex gap-4 mb-4">
                <input type="file" id="libImageLoader" accept="image/*" multiple class="hidden" onchange="loadToLibrary(event)">
                <button onclick="document.getElementById('libImageLoader').click()" class="px-4 py-2 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-xl font-bold hover:scale-105 transition text-sm">Добавить фото</button>
            </div>
            <div id="library-grid" class="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-4 gap-4 p-2 content-start bg-black/30 rounded-xl border border-white/5">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true }), 
              selCanvas = document.getElementById('selection-canvas'), selCtx = selCanvas.getContext('2d'),
              paintApp = document.getElementById('paint-app'), wrapper = document.getElementById('canvas-wrapper'),
              toolbar = document.getElementById('toolbar');
        let scale = 1, posX = 0, posY = 0, mode = 'brush', isPanning = false, startX, startY, lastX = 0, lastY = 0;

        let undoStack = [], redoStack = [];
        const MAX_HISTORY = 30;

        // Переменные для Ножниц
        let isSelecting = false;
        let hasSelection = false;
        let isRectMode = false; // Режим "Ровность"
        let selPoints = [];
        let selectionImg = null; 
        let currentSelRect = null;
        let startSelRect = null;
        let normPoints = [];
        let activeHandle = null;
        const HANDLE_RADIUS = 6;
        let dragStartX, dragStartY;
        let dragStartRmx, dragStartRmy, lastGlobalMx, lastGlobalMy;
        let isDraggingSelection = false;
        let isResizing = false;
        let selectionRotation = 0;
        
        const hueSlider = document.getElementById('hue-slider');
        const rotationSlider = document.getElementById('rotation-slider');
        const rotationDisplay = document.getElementById('rotationDisplay');
        let drawing = false;

        let libraryImages = [];

        const brushSizeInput = document.getElementById('brushSize');
        const brushSizeDisplay = document.getElementById('brushSizeDisplay');
        brushSizeInput.addEventListener('input', (e) => { brushSizeDisplay.textContent = e.target.value; });

        const opacitySlider = document.getElementById('opacitySlider');
        const opacityDisplay = document.getElementById('opacityDisplay');
        opacitySlider.addEventListener('input', (e) => {
            opacityDisplay.textContent = e.target.value + '%';
            if (hasSelection) drawSelectionLayer();
        });

        rotationSlider.addEventListener('input', (e) => {
            selectionRotation = parseInt(e.target.value);
            rotationDisplay.textContent = selectionRotation + '°';
            if (hasSelection) drawSelectionLayer();
        });

        function saveState() {
            const currentState = canvas.toDataURL();
            if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== currentState) {
                undoStack.push(currentState);
                if (undoStack.length > MAX_HISTORY) undoStack.shift();
                redoStack = []; 
            }
        }

        function undo() {
            if (hasSelection) commitSelection();
            if (undoStack.length > 1) {
                redoStack.push(undoStack.pop());
                restoreState(undoStack[undoStack.length - 1]);
            }
        }

        function redo() {
            if (hasSelection) commitSelection();
            if (redoStack.length > 0) {
                const nextState = redoStack.pop();
                undoStack.push(nextState);
                restoreState(nextState);
            }
        }

        function restoreState(dataUrl) {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            img.src = dataUrl;
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' && document.activeElement.type === 'text') return;
            if (e.ctrlKey && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
            if (e.ctrlKey && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) { e.preventDefault(); redo(); }
            if (e.key === 'Escape' && hasSelection) commitSelection();
        });

        window.addEventListener('paste', function(e) {
            if (e.clipboardData) {
                const items = e.clipboardData.items;
                if (!items) return;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        const reader = new FileReader();
                        reader.onload = (event) => pasteImageToCanvas(event.target.result);
                        reader.readAsDataURL(items[i].getAsFile());
                    }
                }
            }
        });

        function toggleRectMode() {
            isRectMode = !isRectMode;
            const btn = document.getElementById('rect-select-btn');
            if (isRectMode) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function setMode(newMode) {
            if (hasSelection) commitSelection(); 

            if (newMode === 'scissors' && mode === 'scissors') {
                newMode = 'brush';
            }

            mode = newMode;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(newMode + '-tool');
            if (activeBtn) activeBtn.classList.add('active');
            
            if (mode === 'scissors') {
                document.body.classList.add('scissors-active');
            } else {
                document.body.classList.remove('scissors-active');
            }

            updateCursor();
            ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
            if (newMode === 'text') document.getElementById('colorPicker').click();
        }

        function getResizeHandle(rmx, rmy) {
            if (!hasSelection || !currentSelRect) return null;
            const r = (HANDLE_RADIUS * 1.5) / scale; 
            const {x, y, w, h} = currentSelRect;
            const cx = x + w/2;
            const cy = y + h/2;
            
            const handles = {
                'tl': {hx: -w/2, hy: -h/2}, 'tm': {hx: 0, hy: -h/2}, 'tr': {hx: w/2, hy: -h/2},
                'rm': {hx: w/2, hy: 0},     'br': {hx: w/2, hy: h/2}, 'bm': {hx: 0, hy: h/2},
                'bl': {hx: -w/2, hy: h/2},  'lm': {hx: -w/2, hy: 0}
            };
            
            const lmx = rmx - cx;
            const lmy = rmy - cy;
            
            for (let key in handles) {
                if (Math.hypot(lmx - handles[key].hx, lmy - handles[key].hy) <= r) return key;
            }
            return null;
        }

        function updateCursor(mouseX, mouseY) {
            if (mode === 'scissors') {
                if (hasSelection && mouseX !== undefined && mouseY !== undefined) {
                    let rmx = mouseX, rmy = mouseY;
                    const cx = currentSelRect.x + currentSelRect.w/2;
                    const cy = currentSelRect.y + currentSelRect.h/2;
                    const rad = -selectionRotation * Math.PI / 180;
                    const cos = Math.cos(rad);
                    const sin = Math.sin(rad);
                    rmx = (cos * (mouseX - cx)) - (sin * (mouseY - cy)) + cx;
                    rmy = (sin * (mouseX - cx)) + (cos * (mouseY - cy)) + cy;

                    const handle = getResizeHandle(rmx, rmy);
                    if (handle) {
                        const cursors = { 'tl': 'nwse-resize', 'tm': 'ns-resize', 'tr': 'nesw-resize', 'rm': 'ew-resize', 'br': 'nwse-resize', 'bm': 'ns-resize', 'bl': 'nesw-resize', 'lm': 'ew-resize' };
                        canvas.style.cursor = cursors[handle];
                        return;
                    }

        function drawSelectionLayer() {

            const {x, y, w, h} = currentSelRect;
            const cx = x + w/2;
            const cy = y + h/2;

            selCtx.save();
            selCtx.translate(cx, cy);
            selCtx.rotate(selectionRotation * Math.PI / 180);

        function performFloodFill(startX, startY, hexColor) {

            const targetPos = (startY * w + startX) * 4;

            let fR = parseInt(hexColor.slice(1, 3), 16), fG = parseInt(hexColor.slice(3, 5), 16), fB = parseInt(hexColor.slice(5, 7), 16);
            const opacity = opacitySlider.value / 100;
            if (Math.abs(tR - fR) < 10 && Math.abs(tG - fG) < 10 && Math.abs(tB - fB) < 10 && opacity === 1) return;
            const matchColor = (pos) => Math.abs(data[pos] - tR) < 40 && Math.abs(data[pos+1] - tG) < 40 && Math.abs(data[pos+2] - tB) < 40 && Math.abs(data[pos+3] - tA) < 40;
            const setColor = (pos) => {
                data[pos] = Math.round(fR * opacity + data[pos] * (1 - opacity));
                data[pos+1] = Math.round(fG * opacity + data[pos+1] * (1 - opacity));
                data[pos+2] = Math.round(fB * opacity + data[pos+2] * (1 - opacity));
                data[pos+3] = Math.min(255, data[pos+3] + Math.round(opacity * 255));
            };
            const stack = [[startX, startY]];
            while (stack.length > 0) {
                let [x, y] = stack.pop();
                let lx = x; while (lx >= 0 && matchColor((y * w + lx) * 4)) lx--; lx++;
                let rx = x; while (rx < w && matchColor((y * w + rx) * 4)) rx++; rx--;
                let spanAbove = false, spanBelow = false;
                for (let i = lx; i <= rx; i++) {
                    setColor((y * w + i) * 4);
                    if (y > 0) {
                        if (matchColor(((y - 1) * w + i) * 4)) { if (!spanAbove) { stack.push([i, y - 1]); spanAbove = true; } } else if (spanAbove) spanAbove = false;
                    }
                    if (y < h - 1) {
                        if (matchColor(((y + 1) * w + i) * 4)) { if (!spanBelow) { stack.push([i, y + 1]); spanBelow = true; } } else if (spanBelow) spanBelow = false;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0); saveState();
        }

            const link = document.createElement('a'); link.download = 'yos1k_paint.png'; link.href = canvas.toDataURL(); link.click();
        }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); saveState(); }

        function toggleLibrary() {
            const modal = document.getElementById('library-modal');
            if (modal.classList.contains('hidden')) { modal.classList.remove('hidden'); modal.classList.add('flex'); renderLibrary(); } 
            else { modal.classList.add('hidden'); modal.classList.remove('flex'); }
        }
        function loadToLibrary(event) {
            const files = event.target.files;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => { libraryImages.push(e.target.result); renderLibrary(); };
                reader.readAsDataURL(files[i]);
            }
        }
        function renderLibrary() {
            const grid = document.getElementById('library-grid'); grid.innerHTML = '';
            libraryImages.forEach((imgSrc, index) => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'relative group aspect-square rounded-xl overflow-hidden cursor-pointer border border-white/10 hover:border-orange-500 transition';
                const img = document.createElement('img'); img.src = imgSrc; img.className = 'w-full h-full object-cover';
                imgDiv.onclick = () => { pasteImageToCanvas(imgSrc); toggleLibrary(); };
                const delBtn = document.createElement('button'); delBtn.innerHTML = '×';
                delBtn.className = 'absolute top-1 right-1 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow-lg text-sm font-bold';
                delBtn.onclick = (e) => { e.stopPropagation(); libraryImages.splice(index, 1); renderLibrary(); };
                imgDiv.appendChild(img); imgDiv.appendChild(delBtn); grid.appendChild(imgDiv);
            });
        }
    </script>
</body>
</html>
